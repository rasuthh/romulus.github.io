<!DOCTYPE html>
<html>
<head>
  <title>Navanomy | Commodity & Entrepreneurship</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background: #0f1115; color: white; }
    .section { padding: 60px 0; }
    .card { background: #1a1d24; color: white; border: none; }
  </style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

function Navbar() {
  return (
    <nav className="navbar navbar-dark bg-black">
      <div className="container">
        <span className="navbar-brand">NAVANOMY</span>
      </div>
    </nav>
  );
}

function Hero() {
  return (
    <div className="section text-center">
      <div className="container">
        <h1>Commodity → Entrepreneurship → Philosophy</h1>
        <p>Build real-world businesses from physical commodities with purpose.</p>
      </div>
    </div>
  );
}

function Sections() {
  return (
    <div className="section">
      <div className="container">
        <div className="row g-4">

          <div className="col-md-4">
            <div className="card p-3">
              <h4>Commodity Basics</h4>
              <p>Start from real materials: food, waste, energy. Value comes from transformation.</p>
            </div>
          </div>

          <div className="col-md-4">
            <div className="card p-3">
              <h4>Entrepreneurship</h4>
              <p>Convert raw materials into scalable products. Solve real supply gaps.</p>
            </div>
          </div>

          <div className="col-md-4">
            <div className="card p-3">
              <h4>Philosophy</h4>
              <p>Build with purpose. Align profit with sustainability and human progress.</p>
            </div>
          </div>

        </div>
      </div>
    </div>
  );
}

function Process() {
  return (
    <div className="section bg-dark">
      <div className="container text-center">
        <h2>Simple Model</h2>
        <p>Commodity → Waste → Process → Product → Market</p>
      </div>
    </div>
  );
}

function Footer() {
  return (
    <footer className="text-center py-3">
      © 2026 Navanomy
    </footer>
  );
}

function App() {
  return (
    <>
      <Navbar />
      <Hero />
      <Sections />
      <Process />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
