<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RASUTH FLOW STATE STUDIO CLUB</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Inter', sans-serif;
    }

    .hero-title {
      font-size: 56px;
      font-weight: 700;
    }

    h3 {
      font-size: 32px;
      font-weight: 600;
    }

    p {
      color: #b3b3b3;
      font-size: 16px;
    }

    .btn-main {
      background: #ff424d;
      border: none;
      border-radius: 30px;
      padding: 8px 20px;
    }

    .btn-main:hover {
      background: #e63a45;
    }

    .section {
      padding: 80px 0;
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

function Navbar({ setPage }) {
  return (
    <nav className="d-flex justify-content-between align-items-center p-3" style={{background:"#000"}}>
      <div style={{fontWeight:"bold"}}>FlowState Studio</div>
      <div>
        <span className="mx-3" onClick={()=>setPage('home')} style={{cursor:'pointer'}}>Explore</span>
        <span className="mx-3" onClick={()=>setPage('studio')} style={{cursor:'pointer'}}>Community</span>
        <button className="btn btn-main">Join</button>
      </div>
    </nav>
  );
}

function Home() {
  return (
    <div className="container text-center">

      <div className="section">
        <h1 className="hero-title">Enter Flow. Build Real Commodity Power.</h1>
        <p>Trade real commodities. Build real ventures. Stay in deep flow.</p>
        <button className="btn btn-main mt-3">Join FlowState Studio</button>
      </div>

      <div className="row section align-items-center">
        <div className="col-md-6">
          <img src="https://images.unsplash.com/photo-1509395176047-4a66953fd231" className="img-fluid rounded"/>
        </div>
        <div className="col-md-6 text-start">
          <h3>Real World Commodity Execution</h3>
          <p>From agriculture → export → value chain → global opportunity.</p>
        </div>
      </div>

      <div className="row section text-center">
        <div className="col-md-4">
          <h5>🌍 Global Trade</h5>
          <p>Learn import/export systems</p>
        </div>
        <div className="col-md-4">
          <h5>🧠 Flow State</h5>
          <p>No distraction execution system</p>
        </div>
        <div className="col-md-4">
          <h5>💰 Build Ventures</h5>
          <p>Turn waste → commodity → business</p>
        </div>
      </div>

      <div className="section">
        <h3>Work Like This</h3>
        <p>Focus → Execute → Build → Scale</p>
      </div>

      <div className="section">
        <h2>Enter Flow. Build Real Value.</h2>
        <button className="btn btn-main mt-3">Start Now</button>
      </div>

    </div>
  );
}

function Studio() {
  return (
    <div className="container text-center">

      <div className="section">
        <h1>Inside FlowState Studio</h1>
        <p>Where commodities meet execution</p>
      </div>

      <div className="row section">
        <div className="col-md-4">
          <h5>Commodity Basics</h5>
          <p>Understand core markets</p>
        </div>
        <div className="col-md-4">
          <h5>Global Trade Systems</h5>
          <p>Import/export frameworks</p>
        </div>
        <div className="col-md-4">
          <h5>Real Business Execution</h5>
          <p>Build real ventures</p>
        </div>
      </div>

      <div className="row section align-items-center">
        <div className="col-md-6 text-start">
          <h3>Real World Application</h3>
          <p>From farm → waste → product → export → revenue</p>
        </div>
        <div className="col-md-6">
          <img src="https://images.unsplash.com/photo-1517048676732-d65bc937f952" className="img-fluid rounded"/>
        </div>
      </div>

      <div className="section">
        <h3>Daily Flow System</h3>
        <p>Morning: Learning | Midday: Execution | Evening: Reflection</p>
      </div>

      <div className="section">
        <h3>Build Income Through Commodities</h3>
        <p>Trade → Process → Export → Scale</p>
      </div>

      <div className="section">
        <button className="btn btn-main">Join FlowState Studio</button>
      </div>

    </div>
  );
}

function App() {
  const [page, setPage] = React.useState('home');

  return (
    <>
      <Navbar setPage={setPage} />
      {page === 'home' ? <Home /> : <Studio />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
